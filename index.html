<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Amel</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Pacifico&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/animation.css">
<link rel="stylesheet" href="css/responsive.css">

</head>

<body>

<!-- Loading -->

<div id="loading">

<div class="loader-heart"></div>

<h2>Menyiapkan Hadiah...</h2>

<div class="progress">

<div class="progress-bar"></div>

</div>

</div>

<!-- Opening -->

<section id="opening">

<!-- Background -->

<div class="gradient-bg"></div>

<div id="particles"></div>

<div class="floating-hearts"></div>

<div class="sparkles"></div>

<div class="cloud cloud1"></div>
<div class="cloud cloud2"></div>

<!-- Card -->

<div class="card">

<div class="gift">

🎁

</div>

<h1>

Selamat Datang

</h1>

<p>

Ada seseorang yang menyiapkan sesuatu
khusus untukmu.

Semoga kamu bersedia
meluangkan waktu sekitar
3 menit.

</p>

<button id="openBtn">

Buka Hadiah 💝

</button>

</div>

</section>

<!-- Transition -->

<div id="transition"></div>

<!-- Audio -->

<audio id="bgMusic" loop>
    <!-- Nanti tambahkan file musik milikmu sendiri di assets/audio/ -->
    <source src="assets/audio/music.mp3" type="audio/mpeg">
</audio>

<script src="js/app.js"></script>
<script src="js/particles.js"></script>
<script src="js/transition.js"></script>

</body>

</html>
